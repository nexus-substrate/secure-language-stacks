<?xml version="1.0" encoding="UTF-8"?>
<cppcheck-cfg>
  <!-- Enable all security-related checks -->
  <enable>
    <check>warning</check>
    <check>style</check>
    <check>performance</check>
    <check>portability</check>
    <check>information</check>
  </enable>

  <!-- Security-focused checks -->
  <checks>
    <!-- Buffer overflows -->
    <check id="bufferAccessOutOfBounds"/>
    <check id="arrayIndexOutOfBounds"/>
    <check id="outOfBounds"/>

    <!-- Memory management -->
    <check id="memleak"/>
    <check id="resourceLeak"/>
    <check id="memleakOnRealloc"/>
    <check id="deallocDealloc"/>
    <check id="doubleFree"/>
    <check id="useAfterFree"/>
    <check id="deallocuse"/>

    <!-- Null pointer dereference -->
    <check id="nullPointer"/>
    <check id="nullPointerRedundantCheck"/>

    <!-- Uninitialized variables -->
    <check id="uninitvar"/>
    <check id="uninitdata"/>
    <check id="uninitstring"/>

    <!-- Integer overflows -->
    <check id="integerOverflow"/>
    <check id="signConversion"/>

    <!-- String handling -->
    <check id="bufferNotZeroTerminated"/>
    <check id="terminateStrncpy"/>

    <!-- Dangerous functions -->
    <check id="invalidFunctionArg"/>
    <check id="invalidFunctionArgBool"/>
  </checks>

  <!-- Suppressions for test code and third-party libraries -->
  <suppressions>
    <suppress>
      <id>*</id>
      <fileName>*/test/*</fileName>
    </suppress>
    <suppress>
      <id>*</id>
      <fileName>*/tests/*</fileName>
    </suppress>
    <suppress>
      <id>*</id>
      <fileName>*/third_party/*</fileName>
    </suppress>
    <suppress>
      <id>*</id>
      <fileName>*/vendor/*</fileName>
    </suppress>
    <suppress>
      <id>*</id>
      <fileName>*/build/*</fileName>
    </suppress>
  </suppressions>

  <!-- Platform configurations -->
  <platforms>
    <platform>unix64</platform>
    <platform>win64</platform>
  </platforms>

  <!-- Severity mapping -->
  <severity>
    <error>error</error>
    <warning>warning</warning>
    <style>info</style>
    <performance>info</performance>
    <portability>info</portability>
  </severity>

  <!-- Standards -->
  <standards>
    <c>c11</c>
    <cpp>c++17</cpp>
  </standards>

  <!-- Include paths (can be overridden) -->
  <include-paths>
    <path>include</path>
    <path>src</path>
  </include-paths>

  <!-- Max number of configurations to check -->
  <max-configs>16</max-configs>

  <!-- Inline suppression -->
  <inline-suppr>true</inline-suppr>

  <!-- Check all #ifdef configurations -->
  <force>false</force>

  <!-- Additional options -->
  <options>
    <option>--check-level=exhaustive</option>
    <option>--enable=warning,style,performance,portability</option>
    <option>--error-exitcode=1</option>
    <option>--verbose</option>
  </options>
</cppcheck-cfg>
