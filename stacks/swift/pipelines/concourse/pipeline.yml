resources:
  - name: source-code
    type: git
    source:
      uri: ((git-uri))
      branch: ((git-branch))
      private_key: ((git-private-key))

  - name: security-results
    type: s3
    source:
      bucket: ((s3-bucket))
      region_name: ((s3-region))
      access_key_id: ((s3-access-key))
      secret_access_key: ((s3-secret-key))
      versioned_file: swift-security-results.json

jobs:
  - name: swift-security-scan
    plan:
      - get: source-code
        trigger: true

      - task: semgrep-swift
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: returntocorp/semgrep
              tag: latest
          inputs:
            - name: source-code
          outputs:
            - name: semgrep-results
          run:
            path: sh
            args:
              - -exc
              - |
                cd source-code
                semgrep --config p/swift \
                  --config configs/.semgrep.yml \
                  --json \
                  --output ../semgrep-results/swift-semgrep.json \
                  .
                if [ -s ../semgrep-results/swift-semgrep.json ]; then
                  jq '.results | length' ../semgrep-results/swift-semgrep.json
                  exit 1
                fi

      - task: trivy-swift-sca
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: aquasec/trivy
              tag: latest
          inputs:
            - name: source-code
          outputs:
            - name: trivy-results
          run:
            path: sh
            args:
              - -exc
              - |
                cd source-code
                trivy fs \
                  --config configs/trivy.yaml \
                  --format json \
                  --output ../trivy-results/swift-trivy.json \
                  .

      - task: gitleaks-secrets
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: zricethezav/gitleaks
              tag: latest
          inputs:
            - name: source-code
          outputs:
            - name: gitleaks-results
          run:
            path: sh
            args:
              - -exc
              - |
                cd source-code
                gitleaks detect \
                  --source . \
                  --report-format json \
                  --report-path ../gitleaks-results/swift-gitleaks.json \
                  --exit-code 1

      - task: aggregate-results
        config:
          platform: linux
          image_resource:
            type: registry-image
            source:
              repository: stedolan/jq
              tag: latest
          inputs:
            - name: semgrep-results
            - name: trivy-results
            - name: gitleaks-results
          outputs:
            - name: aggregated-results
          run:
            path: sh
            args:
              - -exc
              - |
                jq -s '{
                  stack: "swift",
                  timestamp: now | todate,
                  semgrep: .[0],
                  trivy: .[1],
                  gitleaks: .[2]
                }' \
                  semgrep-results/swift-semgrep.json \
                  trivy-results/swift-trivy.json \
                  gitleaks-results/swift-gitleaks.json \
                  > aggregated-results/swift-security-results.json

      - put: security-results
        params:
          file: aggregated-results/swift-security-results.json
