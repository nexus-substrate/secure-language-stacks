name: Go Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: read
  security-events: write

jobs:
  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep --config stacks/go/configs/.semgrep.yml \
            --config p/golang \
            --json \
            --output semgrep-results.json \
            .

      - name: Check for Critical Issues
        run: |
          if [ -s semgrep-results.json ]; then
            ERROR_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json)
            if [ "$ERROR_COUNT" -gt 0 ]; then
              echo "::error::Semgrep found $ERROR_COUNT critical issues"
              jq '.results[] | select(.extra.severity == "ERROR")' semgrep-results.json
              exit 1
            fi
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  gosec-sast:
    name: Gosec SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run Gosec
        run: |
          gosec -conf stacks/go/configs/gosec.json \
            -fmt json \
            -out gosec-results.json \
            ./...
        continue-on-error: true

      - name: Check for High Severity Issues
        run: |
          if [ -s gosec-results.json ]; then
            HIGH_COUNT=$(jq '[.Issues[] | select(.severity == "HIGH")] | length' gosec-results.json)
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "::error::Gosec found $HIGH_COUNT high-severity issues"
              jq '.Issues[] | select(.severity == "HIGH")' gosec-results.json
              exit 1
            fi
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gosec-results
          path: gosec-results.json

  trivy-sca:
    name: Trivy SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: stacks/go/configs/trivy.yaml
          format: 'json'
          output: 'trivy-results.json'

      - name: Check for Critical Vulnerabilities
        run: |
          if [ -s trivy-results.json ]; then
            CRITICAL_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results.json)
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "::error::Trivy found $CRITICAL_COUNT critical vulnerabilities"
              jq '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")' trivy-results.json
              exit 1
            fi
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run Govulncheck
        run: |
          govulncheck -json ./... > govulncheck-results.json || true

      - name: Check for Vulnerabilities
        run: |
          if [ -s govulncheck-results.json ]; then
            VULN_COUNT=$(jq '[.Vulns[]?] | length' govulncheck-results.json)
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "::warning::govulncheck found $VULN_COUNT vulnerabilities"
              jq '.Vulns[]?' govulncheck-results.json
            fi
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: govulncheck-results
          path: govulncheck-results.json

  gitleaks-secrets:
    name: Gitleaks Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          args: --no-git --report-format json --report-path gitleaks-results.json

      - name: Upload Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: gitleaks-results.json

  aggregate-results:
    name: Aggregate Security Results
    runs-on: ubuntu-latest
    needs: [semgrep-sast, gosec-sast, trivy-sca, govulncheck, gitleaks-secrets]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download All Results
        uses: actions/download-artifact@v4
        with:
          path: security-results

      - name: Aggregate Reports
        run: |
          echo '{"timestamp":"'$(date -Iseconds)'","scans":{}}' > summary.json

          if [ -f security-results/semgrep-results/semgrep-results.json ]; then
            jq '.scans.semgrep = input' summary.json security-results/semgrep-results/semgrep-results.json > tmp.json
            mv tmp.json summary.json
          fi

          if [ -f security-results/gosec-results/gosec-results.json ]; then
            jq '.scans.gosec = input' summary.json security-results/gosec-results/gosec-results.json > tmp.json
            mv tmp.json summary.json
          fi

          if [ -f security-results/trivy-results/trivy-results.json ]; then
            jq '.scans.trivy = input' summary.json security-results/trivy-results/trivy-results.json > tmp.json
            mv tmp.json summary.json
          fi

          if [ -f security-results/govulncheck-results/govulncheck-results.json ]; then
            jq '.scans.govulncheck = input' summary.json security-results/govulncheck-results/govulncheck-results.json > tmp.json
            mv tmp.json summary.json
          fi

          if [ -f security-results/gitleaks-results/gitleaks-results.json ]; then
            jq '.scans.gitleaks = input' summary.json security-results/gitleaks-results/gitleaks-results.json > tmp.json
            mv tmp.json summary.json
          fi

          echo "=== Security Scan Summary ==="
          cat summary.json | jq .

      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: summary.json
