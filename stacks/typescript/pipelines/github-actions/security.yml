name: TypeScript Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Weekly scan on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  semgrep-scan:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/nodejs \
            --config stacks/typescript/configs/.semgrep.yml \
            --sarif \
            --output semgrep-results.sarif \
            --severity ERROR \
            --severity WARNING \
            .

      - name: Upload Semgrep results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

      - name: Generate JSON report
        if: always()
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/nodejs \
            --config stacks/typescript/configs/.semgrep.yml \
            --json \
            --output semgrep-results.json \
            .

      - name: Upload Semgrep JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  trivy-scan:
    name: Trivy SCA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: 'stacks/typescript/configs/trivy.yaml'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Generate JSON report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          trivy-config: 'stacks/typescript/configs/trivy.yaml'
          format: 'json'
          output: 'trivy-results.json'

      - name: Upload Trivy JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json

  gitleaks-scan:
    name: Gitleaks Secret Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: shared/configs/gitleaks.toml
          GITLEAKS_ENABLE_SUMMARY: true

      - name: Upload Gitleaks SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: results.sarif
          category: gitleaks

  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        continue-on-error: true
        run: |
          npm audit --json > npm-audit-results.json
          npm audit --audit-level=moderate

      - name: Upload npm audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: npm-audit-results.json

  eslint-security:
    name: ESLint Security Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --save-dev eslint eslint-plugin-security

      - name: Run ESLint with security plugin
        continue-on-error: true
        run: |
          npx eslint \
            --config stacks/typescript/configs/eslint-security.json \
            --ext .ts,.js \
            --format json \
            --output-file eslint-security-results.json \
            .

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-security-results
          path: eslint-security-results.json

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [semgrep-scan, trivy-scan, gitleaks-scan, npm-audit, eslint-security]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate summary report
        run: |
          cat > security-summary.json <<EOF
          {
            "timestamp": "$(date -Iseconds)",
            "workflow_run": "${{ github.run_id }}",
            "repository": "${{ github.repository }}",
            "ref": "${{ github.ref }}",
            "scanners": {
              "semgrep": "semgrep-results/semgrep-results.json",
              "trivy": "trivy-results/trivy-results.json",
              "gitleaks": "gitleaks-scan detected secrets (check SARIF)",
              "npm-audit": "npm-audit-results/npm-audit-results.json",
              "eslint-security": "eslint-security-results/eslint-security-results.json"
            }
          }
          EOF

      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.json
