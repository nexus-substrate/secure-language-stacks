rules:
  - id: kubernetes-privileged-container
    patterns:
      - pattern: |
          securityContext:
            ...
            privileged: true
            ...
    message: Privileged container can access host resources - use capabilities instead
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-250
      owasp: A05:2021-Security Misconfiguration
      confidence: HIGH
      references:
        - https://kubernetes.io/docs/concepts/security/pod-security-standards/

  - id: kubernetes-host-network
    patterns:
      - pattern: |
          spec:
            ...
            hostNetwork: true
            ...
    message: Pod uses host network namespace - breaks network isolation
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-653
      owasp: A05:2021-Security Misconfiguration
      confidence: HIGH

  - id: kubernetes-host-path-mount
    patterns:
      - pattern: |
          volumes:
            - name: $NAME
              hostPath:
                path: $PATH
    message: hostPath volume mount exposes host filesystem to container
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-22
      owasp: A01:2021-Broken Access Control
      confidence: MEDIUM

  - id: kubernetes-missing-resource-limits
    patterns:
      - pattern: |
          containers:
            - name: $NAME
              ...
      - pattern-not: |
          containers:
            - name: $NAME
              ...
              resources:
                limits:
                  ...
    message: Container missing resource limits - can cause resource exhaustion
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-770
      owasp: A04:2021-Insecure Design
      confidence: MEDIUM

  - id: kubernetes-container-as-root
    patterns:
      - pattern: |
          containers:
            - name: $NAME
              ...
      - pattern-not: |
          containers:
            - name: $NAME
              ...
              securityContext:
                runAsNonRoot: true
                ...
    message: Container runs as root - use runAsNonRoot for least privilege
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-250
      owasp: A01:2021-Broken Access Control
      confidence: MEDIUM

  - id: kubernetes-secret-plaintext
    pattern-either:
      - pattern: |
          data:
            password: $PASSWORD
      - pattern: |
          data:
            api_key: $KEY
      - pattern: |
          stringData:
            password: $PASSWORD
    message: Secret contains plaintext values - use base64 encoding or external secret manager
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-798
      owasp: A02:2021-Cryptographic Failures
      confidence: HIGH

  - id: kubernetes-default-namespace
    patterns:
      - pattern: |
          kind: $KIND
          metadata:
            name: $NAME
      - pattern-not: |
          kind: $KIND
          metadata:
            name: $NAME
            namespace: $NS
      - metavariable-regex:
          metavariable: $KIND
          regex: (Pod|Deployment|Service|ConfigMap|Secret)
    message: Resource deployed to default namespace - use explicit namespaces
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-668
      confidence: LOW

  - id: kubernetes-automount-service-account-token
    patterns:
      - pattern: |
          spec:
            ...
      - pattern-not: |
          spec:
            ...
            automountServiceAccountToken: false
            ...
    message: Pod automounts service account token - disable if not needed
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-522
      owasp: A07:2021-Identification and Authentication Failures
      confidence: MEDIUM

  - id: kubernetes-hostpid-hostipc
    pattern-either:
      - pattern: |
          spec:
            ...
            hostPID: true
            ...
      - pattern: |
          spec:
            ...
            hostIPC: true
            ...
    message: Pod shares host PID/IPC namespace - breaks process isolation
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-653
      owasp: A05:2021-Security Misconfiguration
      confidence: HIGH

  - id: kubernetes-allow-privilege-escalation
    patterns:
      - pattern: |
          securityContext:
            ...
            allowPrivilegeEscalation: true
            ...
    message: allowPrivilegeEscalation enabled - can lead to container escape
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-269
      owasp: A01:2021-Broken Access Control
      confidence: HIGH

  - id: docker-compose-privileged
    patterns:
      - pattern: |
          services:
            $SERVICE:
              ...
              privileged: true
              ...
    message: Docker Compose service runs privileged - avoid if possible
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-250
      confidence: HIGH

  - id: github-actions-script-injection
    patterns:
      - pattern: |
          run: ${{...}}
    message: Potential script injection via GitHub Actions expression - use environment variables
    severity: ERROR
    languages: [yaml]
    metadata:
      cwe: CWE-94
      owasp: A03:2021-Injection
      confidence: MEDIUM
      references:
        - https://docs.github.com/en/actions/security-guides/security-hardening-for-github-actions

  - id: ansible-no-log-missing
    patterns:
      - pattern: |
          - name: $NAME
            ...
      - pattern-either:
          - pattern-regex: (password|secret|token|api_key)
      - pattern-not: |
          - name: $NAME
            ...
            no_log: true
    message: Task handles sensitive data without no_log - will expose in logs
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-532
      owasp: A09:2021-Security Logging and Monitoring Failures
      confidence: MEDIUM

  - id: kubernetes-latest-tag
    patterns:
      - pattern: |
          containers:
            - name: $NAME
              image: $IMAGE:latest
    message: Container uses 'latest' tag - pin to specific version for reproducibility
    severity: WARNING
    languages: [yaml]
    metadata:
      cwe: CWE-829
      owasp: A06:2021-Vulnerable and Outdated Components
      confidence: MEDIUM
