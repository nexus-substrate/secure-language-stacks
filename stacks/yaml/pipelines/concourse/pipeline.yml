---
resource_types:
  - name: pull-request
    type: registry-image
    source:
      repository: teliaoss/github-pr-resource

resources:
  - name: repo
    type: git
    icon: github
    source:
      uri: ((repo-uri))
      branch: ((branch))
      private_key: ((deploy-key))

  - name: pull-requests
    type: pull-request
    icon: source-pull
    source:
      repository: ((github-repository))
      access_token: ((github-token))

jobs:
  - name: yaml-security-scan
    public: true
    plan:
      - get: repo
        trigger: true

      - in_parallel:
          fail_fast: true
          steps:
            - task: yaml-lint
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: cytopia/yamllint
                    tag: latest
                inputs:
                  - name: repo
                run:
                  path: sh
                  args:
                    - -exc
                    - |
                      cd repo
                      yamllint -c stacks/yaml/configs/.yamllint .

            - task: semgrep-kubernetes
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: returntocorp/semgrep
                    tag: latest
                inputs:
                  - name: repo
                run:
                  path: sh
                  args:
                    - -exc
                    - |
                      cd repo
                      semgrep --config=stacks/yaml/configs/.semgrep.yml \
                        --config=p/kubernetes \
                        --severity=ERROR \
                        --severity=WARNING \
                        --json \
                        --output=semgrep-results.json \
                        .

                      # Fail on critical findings
                      errors=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json)
                      if [ "$errors" -gt 0 ]; then
                        echo "Found $errors critical security issues"
                        jq '.results[] | select(.extra.severity == "ERROR")' semgrep-results.json
                        exit 1
                      fi

            - task: kubesec
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: kubesec/kubesec
                    tag: latest
                inputs:
                  - name: repo
                run:
                  path: sh
                  args:
                    - -exc
                    - |
                      cd repo
                      find . -name "*.yaml" -o -name "*.yml" | while read -r file; do
                        if grep -q "kind: Pod\|kind: Deployment\|kind: StatefulSet" "$file"; then
                          echo "Scanning: $file"
                          kubesec scan "$file" || exit 1
                        fi
                      done

            - task: gitleaks
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: zricethezav/gitleaks
                    tag: latest
                inputs:
                  - name: repo
                run:
                  path: sh
                  args:
                    - -exc
                    - |
                      cd repo
                      gitleaks detect \
                        --config=shared/configs/.gitleaks.toml \
                        --source=. \
                        --report-format=json \
                        --report-path=gitleaks-report.json \
                        --verbose

  - name: pr-security-scan
    public: true
    plan:
      - get: pull-requests
        trigger: true
        version: every

      - put: pull-requests
        params:
          path: pull-requests
          status: pending
          context: yaml-security

      - in_parallel:
          fail_fast: false
          steps:
            - task: semgrep
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: returntocorp/semgrep
                    tag: latest
                inputs:
                  - name: pull-requests
                run:
                  path: sh
                  args:
                    - -exc
                    - |
                      cd pull-requests
                      semgrep --config=stacks/yaml/configs/.semgrep.yml \
                        --config=p/kubernetes \
                        --severity=ERROR \
                        --json \
                        --output=semgrep-results.json \
                        .

                      errors=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json)
                      if [ "$errors" -gt 0 ]; then
                        exit 1
                      fi
              on_failure:
                put: pull-requests
                params:
                  path: pull-requests
                  status: failure
                  context: yaml-security

            - task: kubesec
              config:
                platform: linux
                image_resource:
                  type: registry-image
                  source:
                    repository: kubesec/kubesec
                    tag: latest
                inputs:
                  - name: pull-requests
                run:
                  path: sh
                  args:
                    - -exc
                    - |
                      cd pull-requests
                      find . -name "*.yaml" -o -name "*.yml" | while read -r file; do
                        if grep -q "kind: Pod\|kind: Deployment\|kind: StatefulSet" "$file"; then
                          kubesec scan "$file" || exit 1
                        fi
                      done
              on_failure:
                put: pull-requests
                params:
                  path: pull-requests
                  status: failure
                  context: yaml-security

      on_success:
        put: pull-requests
        params:
          path: pull-requests
          status: success
          context: yaml-security
