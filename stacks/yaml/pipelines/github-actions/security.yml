name: YAML Security Scanning

on:
  push:
    branches: [main, develop]
    paths:
      - '**.yaml'
      - '**.yml'
      - 'stacks/yaml/**'
  pull_request:
    branches: [main, develop]
    paths:
      - '**.yaml'
      - '**.yml'
      - 'stacks/yaml/**'
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  yaml-lint:
    name: YAML Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: stacks/yaml/configs/.yamllint
          file_or_dir: .
          strict: true

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep --config=stacks/yaml/configs/.semgrep.yml \
            --config=p/kubernetes \
            --severity=ERROR \
            --severity=WARNING \
            --sarif \
            --output=semgrep-results.sarif \
            .

      - name: Upload Semgrep results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep-yaml

      - name: Check for critical findings
        run: |
          semgrep --config=stacks/yaml/configs/.semgrep.yml \
            --config=p/kubernetes \
            --severity=ERROR \
            --json \
            --output=semgrep-results.json \
            .

          errors=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json)
          if [ "$errors" -gt 0 ]; then
            echo "::error::Found $errors critical security issues"
            jq '.results[] | select(.extra.severity == "ERROR")' semgrep-results.json
            exit 1
          fi

  kubesec:
    name: Kubesec Kubernetes Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Kubesec
        uses: controlplaneio/kubesec-action@v0.0.2
        with:
          input: k8s/*.yaml
          format: sarif
          output: kubesec-results.sarif

      - name: Upload Kubesec results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kubesec-results.sarif
          category: kubesec

  kube-linter:
    name: KubeLinter Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run KubeLinter
        uses: stackrox/kube-linter-action@v1
        with:
          directory: .
          config: stacks/yaml/configs/.kube-linter.yaml
          format: sarif
          output-file: kube-linter-results.sarif

      - name: Upload KubeLinter results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: kube-linter-results.sarif
          category: kube-linter

  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: shared/configs/.gitleaks.toml

  checkov:
    name: Checkov IaC Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: false

      - name: Upload Checkov results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  trivy:
    name: Trivy Misconfiguration Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-config

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [yaml-lint, semgrep, kubesec, kube-linter, gitleaks, checkov, trivy]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.yaml-lint.result }}" != "success" ] || \
             [ "${{ needs.semgrep.result }}" != "success" ] || \
             [ "${{ needs.kubesec.result }}" != "success" ] || \
             [ "${{ needs.kube-linter.result }}" != "success" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.checkov.result }}" != "success" ] || \
             [ "${{ needs.trivy.result }}" != "success" ]; then
            echo "::error::Security checks failed"
            exit 1
          fi
          echo "::notice::All security checks passed"

  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [yaml-lint, semgrep, kubesec, kube-linter, gitleaks, checkov, trivy]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: Create PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const status = {
              yamllint: '${{ needs.yaml-lint.result }}',
              semgrep: '${{ needs.semgrep.result }}',
              kubesec: '${{ needs.kubesec.result }}',
              kubelinter: '${{ needs.kube-linter.result }}',
              gitleaks: '${{ needs.gitleaks.result }}',
              checkov: '${{ needs.checkov.result }}',
              trivy: '${{ needs.trivy.result }}'
            };

            const passed = Object.values(status).every(r => r === 'success');
            const icon = passed ? '✅' : '❌';

            const body = `## ${icon} YAML Security Scan Results

            | Check | Status |
            |-------|--------|
            | YAML Lint | ${status.yamllint === 'success' ? '✅' : '❌'} |
            | Semgrep | ${status.semgrep === 'success' ? '✅' : '❌'} |
            | Kubesec | ${status.kubesec === 'success' ? '✅' : '❌'} |
            | KubeLinter | ${status.kubelinter === 'success' ? '✅' : '❌'} |
            | Gitleaks | ${status.gitleaks === 'success' ? '✅' : '❌'} |
            | Checkov | ${status.checkov === 'success' ? '✅' : '❌'} |
            | Trivy | ${status.trivy === 'success' ? '✅' : '❌'} |

            ${passed ? 'All security checks passed!' : 'Some security checks failed. Please review the workflow logs.'}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
