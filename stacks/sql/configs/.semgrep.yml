rules:
  - id: sql-injection-concatenation
    pattern-either:
      - pattern: |
          EXECUTE('...' + $VAR + '...')
      - pattern: |
          EXEC('...' + $VAR + '...')
      - pattern: |
          SELECT ... WHERE ... = '...' + $VAR
    message: SQL injection via string concatenation - use parameterized queries
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A03:2021-Injection

  - id: sql-dynamic-sql-exec
    pattern-either:
      - pattern: EXEC(@$SQL)
      - pattern: EXECUTE(@$SQL)
      - pattern: sp_executesql @$SQL
    message: Dynamic SQL execution without parameterization
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A03:2021-Injection

  - id: sql-xp-cmdshell
    pattern-either:
      - pattern: EXEC xp_cmdshell $CMD
      - pattern: EXECUTE xp_cmdshell $CMD
      - pattern: sp_configure 'xp_cmdshell', 1
    message: xp_cmdshell enables OS command execution - extreme risk
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-78
      owasp: A03:2021-Injection

  - id: sql-unsafe-grant-all
    pattern-either:
      - pattern: GRANT ALL PRIVILEGES ON ... TO $USER
      - pattern: GRANT ALL ON ... TO $USER
    message: GRANT ALL violates least privilege principle
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: CWE-250
      owasp: A01:2021-Broken Access Control

  - id: sql-grant-with-grant-option
    pattern: GRANT ... WITH GRANT OPTION
    message: WITH GRANT OPTION allows privilege escalation
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: CWE-269
      owasp: A01:2021-Broken Access Control

  - id: sql-wildcard-grant
    pattern-either:
      - pattern: GRANT ... ON *.* TO $USER
      - pattern: GRANT ... ON % TO $USER
    message: Wildcard GRANT applies to all databases/objects
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-732
      owasp: A01:2021-Broken Access Control

  - id: sql-weak-password
    pattern-either:
      - pattern: |
          CREATE USER $USER IDENTIFIED BY '$PASS'
      - pattern: |
          ALTER USER $USER IDENTIFIED BY '$PASS'
    metavariable-pattern:
      metavariable: $PASS
      patterns:
        - pattern-regex: '^.{1,7}$'
    message: Weak password (less than 8 characters)
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-521
      owasp: A07:2021-Identification and Authentication Failures

  - id: sql-no-encryption
    pattern-either:
      - pattern: |
          CREATE TABLE ... (... VARCHAR(...) ...)
      - pattern: |
          ALTER TABLE ... ADD ... VARCHAR(...)
    metavariable-pattern:
      metavariable: $COLUMN
      patterns:
        - pattern-regex: '(ssn|credit|password|secret|token)'
    message: Sensitive column without encryption at rest
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: CWE-311
      owasp: A02:2021-Cryptographic Failures

  - id: sql-truncate-audit-log
    pattern-either:
      - pattern: TRUNCATE TABLE $TABLE
      - pattern: DELETE FROM $TABLE
    metavariable-pattern:
      metavariable: $TABLE
      patterns:
        - pattern-regex: '(audit|log|history)'
    message: Truncating audit/log tables destroys forensic evidence
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-117
      owasp: A09:2021-Security Logging and Monitoring Failures

  - id: sql-disable-audit
    pattern-either:
      - pattern: ALTER DATABASE ... SET AUDIT = OFF
      - pattern: NOAUDIT ...
    message: Disabling database auditing
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-778
      owasp: A09:2021-Security Logging and Monitoring Failures

  - id: sql-into-outfile
    pattern: SELECT ... INTO OUTFILE '$PATH'
    message: INTO OUTFILE allows file system writes - path traversal risk
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-22
      owasp: A01:2021-Broken Access Control

  - id: sql-load-data-infile
    pattern: LOAD DATA INFILE '$PATH' INTO TABLE $TABLE
    message: LOAD DATA INFILE allows file reads - potential data exfiltration
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: CWE-73
      owasp: A03:2021-Injection

  - id: sql-drop-without-backup
    pattern-either:
      - pattern: DROP DATABASE $DB
      - pattern: DROP TABLE $TABLE
    message: DROP operation without backup verification
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: CWE-404
      owasp: A04:2021-Insecure Design

  - id: sql-public-synonym
    pattern: CREATE PUBLIC SYNONYM $NAME FOR $OBJECT
    message: Public synonym exposes object to all users
    languages: [generic]
    severity: WARNING
    metadata:
      cwe: CWE-732
      owasp: A01:2021-Broken Access Control

  - id: sql-unvalidated-cursor
    pattern-either:
      - pattern: |
          DECLARE $CURSOR CURSOR FOR
          SELECT ... WHERE ... = @$VAR
    message: Cursor using unvalidated variable - SQL injection risk
    languages: [generic]
    severity: ERROR
    metadata:
      cwe: CWE-89
      owasp: A03:2021-Injection
