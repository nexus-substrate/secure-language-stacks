rules:
  # SQL Injection Detection
  - id: java-sql-injection
    pattern-either:
      - pattern: |
          $STMT.executeQuery($X + $Y)
      - pattern: |
          $STMT.executeUpdate($X + $Y)
      - pattern: |
          $STMT.execute($X + $Y)
      - pattern: |
          Statement.createStatement(...).executeQuery($X + $Y)
    message: Potential SQL injection vulnerability. Use PreparedStatement with parameterized queries.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021 - Injection"
      category: security

  # XXE (XML External Entity) Detection
  - id: java-xxe-vulnerability
    pattern-either:
      - pattern: |
          $FACTORY = DocumentBuilderFactory.newInstance();
          ...
          $BUILDER = $FACTORY.newDocumentBuilder();
      - pattern: |
          $FACTORY = SAXParserFactory.newInstance();
          ...
          $PARSER = $FACTORY.newSAXParser();
      - pattern: |
          XMLInputFactory.newInstance()
    pattern-not: |
      $FACTORY.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
    message: XML parser not configured to prevent XXE attacks. Disable DTDs and external entities.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-611"
      owasp: "A05:2021 - Security Misconfiguration"
      category: security

  # Insecure Deserialization
  - id: java-insecure-deserialization
    pattern-either:
      - pattern: |
          new ObjectInputStream($STREAM)
      - pattern: |
          $OIS.readObject()
    message: Insecure deserialization detected. Validate and whitelist allowed classes before deserializing.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-502"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      category: security

  # LDAP Injection
  - id: java-ldap-injection
    pattern-either:
      - pattern: |
          $CTX.search($X, $Y + $USER_INPUT, ...)
      - pattern: |
          new SearchControls(...).setFilter($X + $USER_INPUT)
    message: Potential LDAP injection. Sanitize user input and use parameterized LDAP queries.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-90"
      owasp: "A03:2021 - Injection"
      category: security

  # Expression Language Injection
  - id: java-el-injection
    pattern-either:
      - pattern: |
          $CONTEXT.createValueExpression($USER_INPUT, ...)
      - pattern: |
          $CONTEXT.eval($USER_INPUT)
      - pattern: |
          ExpressionFactory.createValueExpression(..., $USER_INPUT, ...)
    message: Expression Language injection risk. Do not evaluate user-controlled expressions.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-94"
      owasp: "A03:2021 - Injection"
      category: security

  # Weak Cryptography
  - id: java-weak-crypto
    pattern-either:
      - pattern: Cipher.getInstance("DES/...")
      - pattern: Cipher.getInstance("RC4/...")
      - pattern: Cipher.getInstance("MD5/...")
      - pattern: MessageDigest.getInstance("MD5")
      - pattern: MessageDigest.getInstance("SHA1")
    message: Weak cryptographic algorithm detected. Use AES-256, SHA-256 or stronger.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-327"
      owasp: "A02:2021 - Cryptographic Failures"
      category: security

  # Hardcoded Credentials
  - id: java-hardcoded-credentials
    pattern-either:
      - pattern: |
          String $PASSWORD = "...";
      - pattern: |
          String $API_KEY = "...";
      - pattern: |
          setPassword("...")
    pattern-regex: "(password|passwd|pwd|secret|api_key|apikey|token)\\s*=\\s*[\"'][^\"']{8,}[\"']"
    message: Hardcoded credentials detected. Use environment variables or secret management.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021 - Identification and Authentication Failures"
      category: security

  # Command Injection
  - id: java-command-injection
    pattern-either:
      - pattern: Runtime.getRuntime().exec($USER_INPUT)
      - pattern: ProcessBuilder($USER_INPUT).start()
      - pattern: |
          new ProcessBuilder($CMD + $USER_INPUT)
    message: Command injection risk. Validate and sanitize all user input before executing commands.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021 - Injection"
      category: security

  # Path Traversal
  - id: java-path-traversal
    pattern-either:
      - pattern: new File($USER_INPUT)
      - pattern: Files.newInputStream(Paths.get($USER_INPUT))
      - pattern: new FileInputStream($USER_INPUT)
    message: Path traversal vulnerability. Validate and canonicalize file paths.
    severity: WARNING
    languages: [java]
    metadata:
      cwe: "CWE-22"
      owasp: "A01:2021 - Broken Access Control"
      category: security

  # Server-Side Request Forgery (SSRF)
  - id: java-ssrf
    pattern-either:
      - pattern: new URL($USER_INPUT).openConnection()
      - pattern: HttpClient.newHttpClient().send(HttpRequest.newBuilder().uri(URI.create($USER_INPUT))...)
    message: SSRF vulnerability. Validate URLs against an allowlist before making requests.
    severity: ERROR
    languages: [java]
    metadata:
      cwe: "CWE-918"
      owasp: "A10:2021 - Server-Side Request Forgery"
      category: security
