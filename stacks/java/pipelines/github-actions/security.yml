name: Java Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2g -XX:+UseParallelGC'

jobs:
  # Job 1: Semgrep SAST
  semgrep:
    name: Semgrep Security Analysis
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep --config=stacks/java/configs/.semgrep.yml \
                  --config=p/java \
                  --json \
                  --output=semgrep-results.json \
                  --sarif \
                  --output=semgrep.sarif \
                  --verbose \
                  .

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

      - name: Check for Critical Issues
        run: |
          CRITICAL_COUNT=$(jq '[.results[] | select(.extra.severity == "ERROR")] | length' semgrep-results.json)
          echo "Critical issues found: $CRITICAL_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            jq -r '.results[] | select(.extra.severity == "ERROR") | "\(.path):\(.start.line) - \(.extra.message)"' semgrep-results.json
            exit 1
          fi

  # Job 2: SpotBugs with FindSecBugs
  spotbugs:
    name: SpotBugs Security Analysis
    runs-on: ubuntu-latest
    needs: semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Download FindSecBugs Plugin
        run: |
          mkdir -p .spotbugs
          curl -L https://github.com/find-sec-bugs/find-sec-bugs/releases/download/version-1.12.0/findsecbugs-plugin-1.12.0.jar \
               -o .spotbugs/findsecbugs-plugin.jar

      - name: Build and Run SpotBugs
        run: |
          mvn clean compile spotbugs:check \
              -DspotbugsXmlOutput=true \
              -DspotbugsXmlOutputFilename=spotbugs-results.xml \
              -DexcludeFilterFile=stacks/java/configs/spotbugs-security.xml \
              -Dspotbugs.pluginList=.spotbugs/findsecbugs-plugin.jar

      - name: Upload SpotBugs Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-results
          path: target/spotbugs-results.xml

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ SpotBugs detected security vulnerabilities. Please review the artifacts.'
            })

  # Job 3: Trivy Filesystem Scan
  trivy-fs:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Run Trivy JSON Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json

      - name: Check for Critical Vulnerabilities
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical vulnerabilities detected"
            jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL") | "\(.PkgName)@\(.InstalledVersion): \(.VulnerabilityID) - \(.Title)"' trivy-results.json
            exit 1
          fi

  # Job 4: OWASP Dependency-Check
  dependency-check:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: trivy-fs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        with:
          project: ${{ github.repository }}
          path: '.'
          format: 'JSON'
          args: >
            --suppression stacks/java/configs/dependency-check.xml
            --failOnCVSS 7
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-results
          path: reports/dependency-check-report.json

  # Job 5: GitLeaks Secret Scanning
  gitleaks:
    name: GitLeaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: true

      - name: Upload GitLeaks Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-results
          path: gitleaks-report.json

  # Job 6: Container Image Scan (if Dockerfile exists)
  trivy-image:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t ${{ github.repository }}:${{ github.sha }} .

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ github.repository }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # Job 7: Aggregate Security Report
  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [semgrep, spotbugs, trivy-fs, dependency-check, gitleaks]
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Summary Report
        run: |
          echo "# Java Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md

          # Semgrep
          if [ -f semgrep-results/semgrep-results.json ]; then
            SEMGREP_COUNT=$(jq '.results | length' semgrep-results/semgrep-results.json)
            echo "- **Semgrep**: $SEMGREP_COUNT findings" >> security-summary.md
          fi

          # Trivy
          if [ -f trivy-results/trivy-results.json ]; then
            TRIVY_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results/trivy-results.json)
            TRIVY_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results/trivy-results.json)
            echo "- **Trivy**: $TRIVY_CRITICAL critical, $TRIVY_HIGH high" >> security-summary.md
          fi

          # GitLeaks
          if [ -f gitleaks-results/gitleaks-report.json ]; then
            GITLEAKS_COUNT=$(jq 'length' gitleaks-results/gitleaks-report.json)
            echo "- **GitLeaks**: $GITLEAKS_COUNT secrets detected" >> security-summary.md
          fi

      - name: Upload Summary Report
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md

      - name: Comment PR with Summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            })
