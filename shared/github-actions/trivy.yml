name: Trivy SCA

on:
  workflow_call:
    inputs:
      scan-type:
        description: "Trivy scan type: fs, image, or repo"
        required: false
        type: string
        default: "fs"
      config:
        description: "Path to trivy.yaml config"
        required: false
        type: string
        default: ""
      severity:
        description: "Comma-separated severity levels"
        required: false
        type: string
        default: "HIGH,CRITICAL"

permissions:
  contents: read
  security-events: write

jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: ${{ inputs.scan-type }}
          severity: ${{ inputs.severity }}
          trivy-config: ${{ inputs.config }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
