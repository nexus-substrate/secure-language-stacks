name: Semgrep SAST

on:
  workflow_call:
    inputs:
      config:
        description: "Path to .semgrep.yml config (leave empty for default rulesets)"
        required: false
        type: string
        default: ""
      rulesets:
        description: "Space-separated Semgrep rulesets"
        required: false
        type: string
        default: "p/default"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          if [ -n "${{ inputs.config }}" ] && [ -f "${{ inputs.config }}" ]; then
            semgrep scan --config "${{ inputs.config }}" --sarif --output semgrep-results.sarif .
          else
            semgrep scan --config "${{ inputs.rulesets }}" --sarif --output semgrep-results.sarif .
          fi

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-results.sarif
